<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#06070b" />
<title>SHIPYARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="aurora"></div>

<header class="topbar">
  <div class="brand">SHIPYARD</div>
  <div class="live-pill"><span class="live-dot"></span>WORKING</div>
</header>

<main class="wrap">

  <p class="status-line">The machine is finding <strong>Notion creators</strong> and reaching out to them — by itself, 24/7.</p>

  <!-- THE FUNNEL: the whole story in one glance -->
  <section class="funnel" id="funnel"></section>

  <!-- HAPPENING NOW -->
  <section class="now">
    <div class="now-head">
      <h2>Happening now</h2>
      <span class="now-tag"><span class="live-dot small"></span>live</span>
    </div>
    <div class="feed" id="feed"></div>
  </section>

  <p class="foot">SHIPYARD · runs while you sleep · <span id="uptime">just started</span></p>
</main>

<script src="app.js"></script>
</body>
</html>
